server:
  http_listen_port: 3200

distributor:
  receivers:
    otlp:
      protocols:
        http:
        grpc:

metrics_generator:
  storage:
    path: /tmp/tempo/generator/wal

  processor:
    service_graphs: {}
    span_metrics: {}

  registry:
    external_labels:
      source: tempo

  traces_storage:
    path: /tmp/tempo/generator/traces

  metrics_ingestion_time_range_slack: 30s

storage:
  trace:
    backend: local
    local:
      path: /tmp/tempo/traces
